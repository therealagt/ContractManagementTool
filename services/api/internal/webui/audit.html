<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Audit Dashboard</title>
  <style>
    :root { font-family: system-ui, sans-serif; color: #1a1a1a; background: #f6f7f9; }
    body { margin: 0; padding: 1.5rem; max-width: 1100px; }
    h1 { margin-top: 0; }
    section { background: #fff; border: 1px solid #dde1e6; border-radius: 8px; padding: 1rem 1.25rem; margin-bottom: 1rem; }
    table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
    th, td { text-align: left; padding: 0.5rem; border-bottom: 1px solid #eee; }
    th { background: #f0f2f5; }
    .status-pass { color: #0a7a32; font-weight: 600; }
    .status-fail { color: #b42318; font-weight: 600; }
    .status-pending { color: #8a6d00; font-weight: 600; }
    button { background: #1a56db; color: #fff; border: none; padding: 0.5rem 1rem; border-radius: 6px; cursor: pointer; }
    button:hover { background: #1544b0; }
    .metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 0.75rem; }
    .metric { background: #f0f4ff; border-radius: 6px; padding: 0.75rem; }
    .metric strong { display: block; font-size: 1.4rem; }
    .risks { color: #b42318; }
    pre { background: #f8f9fa; padding: 0.75rem; overflow: auto; max-height: 300px; font-size: 0.8rem; }
  </style>
</head>
<body>
  <h1>Audit Dashboard</h1>
  <p>Read-only view for auditors. KI drafts are not shown — only confirmed metadata and audit evidence.</p>

  <section>
    <h2>Executive Summary</h2>
    <div id="summary" class="metrics">Loading…</div>
    <ul id="risks" class="risks"></ul>
    <p><button id="export-btn" type="button">Download Evidence Package (ZIP)</button></p>
  </section>

  <section>
    <h2>Control Matrix</h2>
    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Framework</th>
          <th>Control</th>
          <th>Status</th>
          <th>NDA</th>
          <th>AVV</th>
          <th>Open Items</th>
        </tr>
      </thead>
      <tbody id="matrix-body"></tbody>
    </table>
  </section>

  <section>
    <h2>Recent Audit Trail</h2>
    <pre id="trail">Loading…</pre>
  </section>

  <script>
    function statusClass(s) {
      if (s === 'pass') return 'status-pass';
      if (s === 'fail') return 'status-fail';
      return 'status-pending';
    }

    async function loadSummary() {
      const res = await fetch('/audit/summary');
      if (!res.ok) throw new Error('summary failed');
      const data = await res.json();
      const el = document.getElementById('summary');
      el.innerHTML = `
        <div class="metric"><strong>${data.total_contracts}</strong>Total</div>
        <div class="metric"><strong>${data.archived_count}</strong>Archived</div>
        <div class="metric"><strong>${data.pending_review}</strong>In Review</div>
        <div class="metric"><strong>${data.compliance_percent?.toFixed(1) ?? 0}%</strong>Compliance</div>
        <div class="metric"><strong>${data.integrity_failures}</strong>Integrity Failures</div>
        <div class="metric"><strong>${data.audit_chain_valid ? 'OK' : 'FAIL'}</strong>Audit Chain</div>
      `;
      const risks = document.getElementById('risks');
      risks.innerHTML = '';
      (data.top_risks || []).forEach(r => {
        const li = document.createElement('li');
        li.textContent = r;
        risks.appendChild(li);
      });
    }

    async function loadMatrix() {
      const res = await fetch('/audit/control-matrix');
      if (!res.ok) throw new Error('matrix failed');
      const data = await res.json();
      const body = document.getElementById('matrix-body');
      body.innerHTML = '';
      (data.controls || []).forEach(c => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${c.id}</td>
          <td>${c.control_ref}</td>
          <td>${c.name}</td>
          <td class="${statusClass(c.status)}">${c.status}</td>
          <td>${c.nda}</td>
          <td>${c.avv}</td>
          <td>${c.open_items || ''}</td>
        `;
        body.appendChild(tr);
      });
    }

    async function loadTrail() {
      const res = await fetch('/audit/trail');
      if (!res.ok) throw new Error('trail failed');
      const data = await res.json();
      document.getElementById('trail').textContent = JSON.stringify(data.events || [], null, 2);
    }

    document.getElementById('export-btn').addEventListener('click', async () => {
      const res = await fetch('/audit/evidence', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: '{}' });
      if (!res.ok) { alert('Export failed'); return; }
      const blob = await res.blob();
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'evidence-package.zip';
      a.click();
      URL.revokeObjectURL(url);
    });

    Promise.all([loadSummary(), loadMatrix(), loadTrail()]).catch(err => {
      document.body.insertAdjacentHTML('beforeend', `<p style="color:#b42318">${err.message}</p>`);
    });
  </script>
</body>
</html>
